name: Deploy to GKE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure GKE cluster
        run: |
          gcloud container clusters get-credentials cloud-cost-cluster \
            --zone us-central1-a \
            --project cloud-cost-optimizer-488008

      - name: Apply Kubernetes manifests
        run: kubectl apply -f infra/k8s/

      - name: Monitor rollout with rollback
        run: |
          set -e
          kubectl rollout status deployment/frontend-deployment || \
            (kubectl rollout undo deployment/frontend-deployment && exit 1)
          kubectl rollout status deployment/backend-deployment || \
            (kubectl rollout undo deployment/backend-deployment && exit 1)

      - name: Collect cluster status
        run: |
          echo "PODS:" > status.txt
          kubectl get pods -o wide >> status.txt
          echo "\nSERVICES:" >> status.txt
          kubectl get svc >> status.txt
          echo "\nINGRESS:" >> status.txt
          kubectl get ingress >> status.txt

      - name: Notify Slack with dashboard
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file: status.txt
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
