name: SaaS MVP Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Terraform Init
      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init

      # Terraform Validate
      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      # Terraform Plan (Cluster)
      - name: Terraform Plan (Cluster)
        run: |
          cd infra/terraform
          terraform plan -out=tfplan-cluster \
            -target=google_container_cluster.primary \
            -target=google_container_node_pool.frontend_pool \
            -target=google_container_node_pool.backend_pool \
            -var-file="terraform.tfvars"

      # Terraform Apply (Cluster)
      - name: Terraform Apply (Cluster)
        run: |
          cd infra/terraform
          terraform apply -auto-approve tfplan-cluster

      # Export GKE Outputs
      - name: Export GKE Outputs
        run: |
          cd infra/terraform
          echo "GKE_ENDPOINT=$(terraform output -raw gke_endpoint)" >> $GITHUB_ENV
          echo "GKE_CA_CERT=$(terraform output -raw gke_ca_certificate)" >> $GITHUB_ENV

      # Configure kubectl
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=https://$GKE_ENDPOINT \
            --certificate-authority=ca.crt
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }}
          kubectl config set-context gke --cluster=gke --user=sa
          kubectl config use-context gke

      # Terraform Plan (Workloads)
      - name: Terraform Plan (Workloads)
        run: |
          cd infra/terraform
          terraform plan -out=tfplan-workloads -var-file="terraform.tfvars"

      # Terraform Apply (Workloads)
      - name: Terraform Apply (Workloads)
        run: |
          cd infra/terraform
          terraform apply -auto-approve tfplan-workloads

  test:
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Configure kubectl with cluster outputs
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=$GKE_ENDPOINT \
            --certificate-authority=ca.crt
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }}
          kubectl config set-context gke --cluster=gke --user=sa
          kubectl config use-context gke

      # Run unit + integration tests
      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=./ pytest app/tests \
            --maxfail=1 --disable-warnings -q \
            --cov=app --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # Setup Docker Buildx
      - uses: docker/setup-buildx-action@v3

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cloud-cost-optimizer-488008

      # Configure Docker for Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Build & Push Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:latest
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:${{ github.sha }}

      # Build & Push Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:latest
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cloud-cost-optimizer-488008

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # Terraform Init
      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      # Terraform Validate
      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      # Terraform Plan (Cluster)
      - name: Terraform Plan (Cluster)
        working-directory: infra/terraform
        run: terraform plan -out=tfplan-cluster \
          -target=google_container_cluster.primary \
          -target=google_container_node_pool.frontend_pool \
          -target=google_container_node_pool.backend_pool \
          -var-file="terraform.tfvars"

      # Terraform Apply (Cluster)
      - name: Terraform Apply (Cluster)
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan-cluster

      # Export GKE Outputs
      - name: Export GKE Outputs
        working-directory: infra/terraform
        run: |
          echo "GKE_ENDPOINT=$(terraform output -raw gke_endpoint)" >> $GITHUB_ENV
          echo "GKE_CA_CERT=$(terraform output -raw gke_ca_certificate)" >> $GITHUB_ENV

      # Configure kubectl
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=https://$GKE_ENDPOINT \
            --certificate-authority=ca.crt \
            --kubeconfig=infra/kubeconfig
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }} \
            --kubeconfig=infra/kubeconfig
          kubectl config set-context gke --cluster=gke --user=sa --kubeconfig=infra/kubeconfig
          kubectl config use-context gke --kubeconfig=infra/kubeconfig

      # Terraform Plan (Workloads)
      - name: Terraform Plan (Workloads)
        working-directory: infra/terraform
        run: terraform plan -out=tfplan-workloads -var-file="terraform.tfvars"

      # Terraform Apply (Workloads)
      - name: Terraform Apply (Workloads)
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan-workloads

      # Update Frontend Deployment Image
      - name: Update Frontend Deployment Image
        run: |
          kubectl set image deployment/frontend-deployment \
            frontend=us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend-deployment

      # Update Backend Deployment Image
      - name: Update Backend Deployment Image
        run: |
          kubectl set image deployment/backend-deployment \
            backend=us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:${{ github.sha }}
          kubectl rollout status deployment/backend-deployment

  smoke-test:
    runs-on: ubuntu-latest
    needs: [ test, deploy ]
    steps:
      - uses: actions/checkout@v4

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Initialize Terraform
      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      # Run smoke test null resources only
      - name: Terraform Apply Smoke Tests
        working-directory: infra/terraform
        run: terraform apply -auto-approve \
          -target=null_resource.backend_smoke_test \
          -target=null_resource.frontend_smoke_test

      # Collect health status from outputs
      - name: Collect Health Status
        working-directory: infra/terraform
        run: |
          BACKEND_STATUS=$(terraform output -raw backend_health_status || echo "000")
          FRONTEND_STATUS=$(terraform output -raw frontend_health_status || echo "000")

          BACKEND_ICON="❌"; [ "$BACKEND_STATUS" = "200" ] && BACKEND_ICON="✅"
          FRONTEND_ICON="❌"; [ "$FRONTEND_STATUS" = "200" ] && FRONTEND_ICON="✅"

          echo "BACKEND_STATUS=$BACKEND_STATUS" >> $GITHUB_ENV
          echo "FRONTEND_STATUS=$FRONTEND_STATUS" >> $GITHUB_ENV
          echo "BACKEND_ICON=$BACKEND_ICON" >> $GITHUB_ENV
          echo "FRONTEND_ICON=$FRONTEND_ICON" >> $GITHUB_ENV

          [ "$BACKEND_STATUS" = "200" ] || exit 1
          [ "$FRONTEND_STATUS" = "200" ] || exit 1

      # Configure kubectl before pod/service summary
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=$GKE_ENDPOINT \
            --certificate-authority=ca.crt
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }}
          kubectl config set-context gke --cluster=gke --user=sa
          kubectl config use-context gke

      # Pods & Services Summary
      - name: Pods & Services Summary
        run: |
          PODS="$(kubectl get pods --no-headers | awk '{print $3}' | sort | uniq -c | sed 's/^ *//')"
          SERVICES="$(kubectl get svc --no-headers)"
          INGRESS="$(kubectl get ingress --no-headers)"
          echo "PODS=$PODS" >> $GITHUB_ENV
          echo "SERVICES=$SERVICES" >> $GITHUB_ENV
          echo "INGRESS=$INGRESS" >> $GITHUB_ENV

      # Prepare Slack Payload
      - name: Prepare Slack Payload
        run: |
          TEST_STATUS="${{ needs.test.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SMOKE_STATUS="${{ job.status }}"

          TEST_ICON="❌"; [ "$TEST_STATUS" = "success" ] && TEST_ICON="✅"
          DEPLOY_ICON="❌"; [ "$DEPLOY_STATUS" = "success" ] && DEPLOY_ICON="✅"
          SMOKE_ICON="❌"; [ "$SMOKE_STATUS" = "success" ] && SMOKE_ICON="✅"

          jq -n \
            --arg status "${{ job.status }}" \
            --arg test "$TEST_STATUS" \
            --arg deploy "$DEPLOY_STATUS" \
            --arg smoke "$SMOKE_STATUS" \
            --arg test_icon "$TEST_ICON" \
            --arg deploy_icon "$DEPLOY_ICON" \
            --arg smoke_icon "$SMOKE_ICON" \
            --arg pods "$PODS" \
            --arg services "$SERVICES" \
            --arg ingress "$INGRESS" \
            --arg ip "$INGRESS_IP" \
            --arg frontend "$FRONTEND_STATUS" \
            --arg backend "$BACKEND_STATUS" \
            --arg ficon "$FRONTEND_ICON" \
            --arg bicon "$BACKEND_ICON" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: "🚀 SaaS MVP Deployment Status" } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Pipeline:* Cloud Cost Optimizer" },
                    { type: "mrkdwn", text: "*Overall Status:* \($status)" }
                ]},
                { type: "divider" },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Tests:* \($test_icon) (\($test))" },
                    { type: "mrkdwn", text: "*Deploy:* \($deploy_icon) (\($deploy))" },
                    { type: "mrkdwn", text: "*Smoke:* \($smoke_icon) (\($smoke))" }
                ]},
                { type: "divider" },
                { type: "section", text: { "type": "mrkdwn", "text": "*Frontend:* <http://\($ip)/|Open Frontend> \($ficon) (HTTP \($frontend))" } },
                { type: "section", text: { "type": "mrkdwn", "text": "*Backend:* <http://\($ip)/api/health|Open Backend> \($bicon) (HTTP \($backend))" } },
                { type: "section", text: { type: "mrkdwn", text: "*Pods Summary:* \n\($pods)" } },
                { type: "section", text: { type: "mrkdwn", text: "*Services:* \n\($services)" } },
                { type: "section", text: { type: "mrkdwn", text: "*Ingress:* \n\($ingress)" } }
              ]
            }' > slack-payload.json

      # Validate Slack JSON
      - name: Validate Slack JSON
        run: jq . slack-payload.json

      # Notify Slack
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          payload-file-path: slack-payload.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
