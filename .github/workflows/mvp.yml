name: SaaS MVP Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set GOOGLE_CREDENTIALS env
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > $HOME/gcp-key.json

      - name: Terraform Init & Apply
        run: |
          cd infra/terraform
          export GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcp-key.json
          terraform init
          terraform apply -auto-approve -var-file="terraform.tfvars"

  test:
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=./ pytest app/tests --maxfail=1 --disable-warnings -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > $HOME/gcp-key.json
          gcloud auth activate-service-account --key-file=$HOME/gcp-key.json
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:latest
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:latest
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud (needed for Terraform provider)
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # Initialize Terraform
      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      # Validate Terraform
      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      # Plan Terraform changes
      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -out=tfplan

      # Apply Terraform changes (deploy infra + workloads)
      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      # Extract Ingress IP from Terraform output
      - name: Get Ingress IP
        id: ingress
        working-directory: infra/terraform
        run: |
          IP=$(terraform output -raw ingress_ip || true)
          if [ -n "$IP" ]; then
            echo "INGRESS_IP=$IP" >> $GITHUB_ENV
            echo "Ingress IP: $IP"
          else
            echo "Ingress IP not found"
            exit 1
          fi

      # Update Frontend Deployment Image via kubectl set image
      - name: Update Frontend Deployment Image
        run: |
          kubectl set image deployment/frontend-deployment \
            frontend=us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend-deployment

      # Update Backend Deployment Image via kubectl set image
      - name: Update Backend Deployment Image
        run: |
          kubectl set image deployment/backend-deployment \
            backend=us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:${{ github.sha }}
          kubectl rollout status deployment/backend-deployment

  smoke-test:
    runs-on: ubuntu-latest
    needs: [ test, deploy ]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply Smoke Tests
        working-directory: infra/terraform
        run: terraform apply -auto-approve -target=null_resource.backend_smoke_test -target=null_resource.frontend_smoke_test

      - name: Collect Health Status
        working-directory: infra/terraform
        run: |
          BACKEND_STATUS=$(terraform output -raw backend_health_status || echo "000")
          FRONTEND_STATUS=$(terraform output -raw frontend_health_status || echo "000")

          BACKEND_ICON="❌"; [ "$BACKEND_STATUS" = "200" ] && BACKEND_ICON="✅"
          FRONTEND_ICON="❌"; [ "$FRONTEND_STATUS" = "200" ] && FRONTEND_ICON="✅"

          echo "BACKEND_STATUS=$BACKEND_STATUS" >> $GITHUB_ENV
          echo "FRONTEND_STATUS=$FRONTEND_STATUS" >> $GITHUB_ENV
          echo "BACKEND_ICON=$BACKEND_ICON" >> $GITHUB_ENV
          echo "FRONTEND_ICON=$FRONTEND_ICON" >> $GITHUB_ENV

          [ "$BACKEND_STATUS" = "200" ] || exit 1
          [ "$FRONTEND_STATUS" = "200" ] || exit 1

      - name: Pods & Services Summary
        run: |
          PODS="$(kubectl get pods --no-headers | awk '{print $3}' | sort | uniq -c | sed 's/^ *//')"
          SERVICES="$(kubectl get svc --no-headers)"
          INGRESS="$(kubectl get ingress --no-headers)"
          echo "PODS=$PODS" >> $GITHUB_ENV
          echo "SERVICES=$SERVICES" >> $GITHUB_ENV
          echo "INGRESS=$INGRESS" >> $GITHUB_ENV

      - name: Prepare Slack Payload
        run: |
          TEST_STATUS="${{ needs.test.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SMOKE_STATUS="${{ job.status }}"

          TEST_ICON="❌"; if [ "$TEST_STATUS" = "success" ]; then TEST_ICON="✅"; fi
          DEPLOY_ICON="❌"; if [ "$DEPLOY_STATUS" = "success" ]; then DEPLOY_ICON="✅"; fi
          SMOKE_ICON="❌"; if [ "$SMOKE_STATUS" = "success" ]; then SMOKE_ICON="✅"; fi

          jq -n \
            --arg status "${{ job.status }}" \
            --arg test "$TEST_STATUS" \
            --arg deploy "$DEPLOY_STATUS" \
            --arg smoke "$SMOKE_STATUS" \
            --arg test_icon "$TEST_ICON" \
            --arg deploy_icon "$DEPLOY_ICON" \
            --arg smoke_icon "$SMOKE_ICON" \
            --arg pods "$PODS" \
            --arg services "$SERVICES" \
            --arg ingress "$INGRESS" \
            --arg ip "$INGRESS_IP" \
            --arg frontend "$FRONTEND_STATUS" \
            --arg backend "$BACKEND_STATUS" \
            --arg ficon "$FRONTEND_ICON" \
            --arg bicon "$BACKEND_ICON" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: "🚀 SaaS MVP Deployment Status" } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Pipeline:* Cloud Cost Optimizer" },
                    { type: "mrkdwn", text: "*Overall Status:* \($status)" }
                ]},
                { type: "divider" },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Tests:* \($test_icon) (\($test))" },
                    { type: "mrkdwn", text: "*Deploy:* \($deploy_icon) (\($deploy))" },
                    { type: "mrkdwn", text: "*Smoke:* \($smoke_icon) (\($smoke))" }
                ]},
                { type: "divider" },
                { type: "section", text: { "type": "mrkdwn", "text": "*Frontend:* <http://\($ip)/|Open Frontend> \($ficon) (HTTP \($frontend))" } },
                { type: "section", text: { "type": "mrkdwn", "text": "*Backend:* <http://\($ip)/api/health|Open Backend> \($bicon) (HTTP \($backend))" } },
                { type: "section", text: { type: "mrkdwn", text: "*Pods Summary:* \n\($pods)" } },
                { type: "section", text: { type: "mrkdwn", text: "*Services:* \n\($services)" } },
                { type: "section", text: { type: "mrkdwn", text: "*Ingress:* \n\($ingress)" } }
              ]
            }' > slack-payload.json

      - name: Validate Slack JSON
        run: jq . slack-payload.json

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          payload-file-path: slack-payload.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
