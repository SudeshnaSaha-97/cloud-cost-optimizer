name: SaaS MVP Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      # Map GitHub secrets to Terraform variables
      TF_VAR_cloudsql_db_user: ${{ secrets.CLOUDSQL_DB_USER }}
      TF_VAR_cloudsql_db_password: ${{ secrets.CLOUDSQL_DB_PASSWORD }}
      TF_VAR_cloudsql_db_name: ${{ secrets.CLOUDSQL_DB_NAME }}
      TF_VAR_gcp_service_account_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      TF_VAR_postgres_user: ${{ secrets.POSTGRES_USER }}
      TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
      TF_VAR_postgres_db: ${{ secrets.POSTGRES_DB }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -auto-approve tfplan

      - name: Export GKE Outputs
        run: |
          cd infra/terraform
          echo "GKE_ENDPOINT=$(terraform output -raw cluster_outputs.gke_endpoint)" >> $GITHUB_ENV
          echo "GKE_CA_CERT=$(terraform output -raw cluster_outputs.gke_ca_certificate)" >> $GITHUB_ENV

      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=https://$GKE_ENDPOINT \
            --certificate-authority=ca.crt \
            --kubeconfig=infra/kubeconfig
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }} \
            --kubeconfig=infra/kubeconfig
          kubectl config set-context gke --cluster=gke --user=sa --kubeconfig=infra/kubeconfig
          kubectl config use-context gke --kubeconfig=infra/kubeconfig

  test:
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Configure kubectl with cluster outputs from provision job
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=https://$GKE_ENDPOINT \
            --certificate-authority=ca.crt \
            --kubeconfig=infra/kubeconfig
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }} \
            --kubeconfig=infra/kubeconfig
          kubectl config set-context gke --cluster=gke --user=sa --kubeconfig=infra/kubeconfig
          kubectl config use-context gke --kubeconfig=infra/kubeconfig

      # Run unit + integration tests
      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=./ pytest app/tests \
            --maxfail=1 --disable-warnings -q \
            --cov=app --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # Setup Docker Buildx
      - uses: docker/setup-buildx-action@v3

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cloud-cost-optimizer-488008

      # Configure Docker for Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Build & Push Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:latest
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend:${{ github.sha }}

      # Build & Push Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:latest
            us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cloud-cost-optimizer-488008

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # Terraform Init + Apply (root orchestrator)
      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -out=tfplan -var-file="terraform.tfvars"

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      # Export GKE Outputs
      - name: Export GKE Outputs
        working-directory: infra/terraform
        run: |
          echo "GKE_ENDPOINT=$(terraform output -raw cluster_outputs.gke_endpoint)" >> $GITHUB_ENV
          echo "GKE_CA_CERT=$(terraform output -raw cluster_outputs.gke_ca_certificate)" >> $GITHUB_ENV

      # Configure kubectl
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=https://$GKE_ENDPOINT \
            --certificate-authority=ca.crt \
            --kubeconfig=infra/kubeconfig
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }} \
            --kubeconfig=infra/kubeconfig
          kubectl config set-context gke --cluster=gke --user=sa --kubeconfig=infra/kubeconfig
          kubectl config use-context gke --kubeconfig=infra/kubeconfig

      # Deploy workloads via Helm with updated images
      - name: Deploy Frontend via Helm
        run: |
          helm upgrade --install frontend ./infra/helm/frontend \
            --namespace default \
            --set image.repository=us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/frontend-repo/frontend \
            --set image.tag=${{ github.sha }}

      - name: Deploy Backend via Helm
        run: |
          helm upgrade --install backend ./infra/helm/backend \
            --namespace default \
            --set image.repository=us-central1-docker.pkg.dev/cloud-cost-optimizer-488008/backend-repo/backend \
            --set image.tag=${{ github.sha }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: [ test, deploy ]
    steps:
      - uses: actions/checkout@v4

      # Authenticate with GCP
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cloud-cost-optimizer-488008

      # Configure kubectl with cluster outputs
      - name: Configure kubectl
        run: |
          echo "$GKE_CA_CERT" > ca.crt
          kubectl config set-cluster gke \
            --server=https://$GKE_ENDPOINT \
            --certificate-authority=ca.crt \
            --kubeconfig=infra/kubeconfig
          kubectl config set-credentials sa \
            --token=${{ secrets.GCP_SA_TOKEN }} \
            --kubeconfig=infra/kubeconfig
          kubectl config set-context gke --cluster=gke --user=sa --kubeconfig=infra/kubeconfig
          kubectl config use-context gke --kubeconfig=infra/kubeconfig

      # Verify rollout status of deployments
      - name: Verify Frontend Rollout
        run: kubectl rollout status deployment/frontend-deployment --timeout=120s

      - name: Verify Backend Rollout
        run: kubectl rollout status deployment/backend-deployment --timeout=120s

      # Get ingress IP
      - name: Get Ingress IP
        run: |
          INGRESS_IP=$(kubectl get ingress frontend-ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_ENV

      # Curl smoke tests
      - name: Curl Frontend
        run: |
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$INGRESS_IP/)
          echo "FRONTEND_STATUS=$FRONTEND_STATUS" >> $GITHUB_ENV
          [ "$FRONTEND_STATUS" = "200" ] || exit 1

      - name: Curl Backend Health
        run: |
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$INGRESS_IP/api/health)
          echo "BACKEND_STATUS=$BACKEND_STATUS" >> $GITHUB_ENV
          [ "$BACKEND_STATUS" = "200" ] || exit 1

      # Pods & Services Summary
      - name: Pods & Services Summary
        run: |
          PODS="$(kubectl get pods --no-headers)"
          SERVICES="$(kubectl get svc --no-headers)"
          INGRESS="$(kubectl get ingress --no-headers)"
          echo "PODS=$PODS" >> $GITHUB_ENV
          echo "SERVICES=$SERVICES" >> $GITHUB_ENV
          echo "INGRESS=$INGRESS" >> $GITHUB_ENV

      # Prepare Slack Payload
      - name: Prepare Slack Payload
        run: |
          TEST_STATUS="${{ needs.test.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SMOKE_STATUS="${{ job.status }}"

          TEST_ICON="❌"; [ "$TEST_STATUS" = "success" ] && TEST_ICON="✅"
          DEPLOY_ICON="❌"; [ "$DEPLOY_STATUS" = "success" ] && DEPLOY_ICON="✅"
          SMOKE_ICON="❌"; [ "$SMOKE_STATUS" = "success" ] && SMOKE_ICON="✅"

          FRONTEND_ICON="❌"; [ "$FRONTEND_STATUS" = "200" ] && FRONTEND_ICON="✅"
          BACKEND_ICON="❌"; [ "$BACKEND_STATUS" = "200" ] && BACKEND_ICON="✅"

          jq -n \
            --arg status "$SMOKE_STATUS" \
            --arg test "$TEST_STATUS" \
            --arg deploy "$DEPLOY_STATUS" \
            --arg smoke "$SMOKE_STATUS" \
            --arg test_icon "$TEST_ICON" \
            --arg deploy_icon "$DEPLOY_ICON" \
            --arg smoke_icon "$SMOKE_ICON" \
            --arg pods "$PODS" \
            --arg services "$SERVICES" \
            --arg ingress "$INGRESS" \
            --arg ip "$INGRESS_IP" \
            --arg frontend "$FRONTEND_STATUS" \
            --arg backend "$BACKEND_STATUS" \
            --arg ficon "$FRONTEND_ICON" \
            --arg bicon "$BACKEND_ICON" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: "🚀 SaaS MVP Smoke Test Results" } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Pipeline:* Cloud Cost Optimizer" },
                    { type: "mrkdwn", text: "*Overall Status:* \($status)" }
                ]},
                { type: "divider" },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Tests:* \($test_icon) (\($test))" },
                    { type: "mrkdwn", text: "*Deploy:* \($deploy_icon) (\($deploy))" },
                    { type: "mrkdwn", text: "*Smoke:* \($smoke_icon) (\($smoke))" }
                ]},
                { type: "divider" },
                { type: "section", text: { "type": "mrkdwn", "text": "*Frontend:* <http://\($ip)/|Open Frontend> \($ficon) (HTTP \($frontend))" } },
                { type: "section", text: { "type": "mrkdwn", "text": "*Backend:* <http://\($ip)/api/health|Open Backend> \($bicon) (HTTP \($backend))" } },
                { type: "section", text: { type: "mrkdwn", text: "*Pods:* \n\($pods)" } },
                { type: "section", text: { type: "mrkdwn", text: "*Services:* \n\($services)" } },
                { type: "section", text: { type: "mrkdwn", text: "*Ingress:* \n\($ingress)" } }
              ]
            }' > slack-payload.json

      # Validate Slack JSON
      - name: Validate Slack JSON
        run: jq . slack-payload.json

      # Notify Slack
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          payload-file-path: slack-payload.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
